services:
  backend:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      DB_PATH: /app/data/traces.duckdb
      ADDR: :8080
      API_KEY: ""
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      PUBLIC_API_URL: https://observce.hra42.com
      API_KEY: ""
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
