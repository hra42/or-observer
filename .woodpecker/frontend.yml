when:
  event:
    - push
    - pull_request
    - manual

steps:
  lint-check:
    image: node:lts-alpine
    directory: frontend
    commands:
      - npm ci
      - ./node_modules/.bin/svelte-kit sync
      - ./node_modules/.bin/svelte-check --tsconfig ./tsconfig.json

  dockerfile-validation:
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint frontend/Dockerfile || true

  build-test:
    image: node:lts-alpine
    directory: frontend
    commands:
      - npm run build
      - echo "Frontend build passed"
    depends_on:
      - lint-check

  build-amd64:
    image: woodpeckerci/plugin-docker-buildx:6.0.3
    settings:
      registry: registry.hra42.com
      repo: registry.hra42.com/or-observer-frontend
      mirror: https://registry.hra42.com
      tags:
        - latest-amd64
      platforms: linux/amd64
      dockerfile: frontend/Dockerfile
      context: frontend
      buildkit_oci_max_parallelism: 32
      output: type=image,push=true
      build_args:
        - VITE_API_URL=https://observce.hra42.com
      cache_images:
        - registry.hra42.com/or-observer-frontend:cache-amd64
    when:
      branch: main
      event: push

  build-arm64:
    image: woodpeckerci/plugin-docker-buildx:6.0.3
    settings:
      registry: registry.hra42.com
      repo: registry.hra42.com/or-observer-frontend
      mirror: https://registry.hra42.com
      tags:
        - latest-arm64
      platforms: linux/arm64
      dockerfile: frontend/Dockerfile
      context: frontend
      buildkit_oci_max_parallelism: 4
      output: type=image,push=true
      build_args:
        - VITE_API_URL=https://observce.hra42.com
      cache_images:
        - registry.hra42.com/or-observer-frontend:cache-arm64
      ssh_key:
        from_secret: ssh_key
      remote_builders:
        - root@192.168.2.20
    when:
      branch: main
      event: push

  manifest:
    image: docker:dind
    commands:
      - docker buildx imagetools create -t registry.hra42.com/or-observer-frontend:latest registry.hra42.com/or-observer-frontend:latest-amd64 registry.hra42.com/or-observer-frontend:latest-arm64
    when:
      branch: main
      event: push
    depends_on:
      - build-amd64
      - build-arm64

  skopeo-copy:
    image: registry.hra42.com/skopeo/stable:latest
    commands:
      - skopeo copy --multi-arch all docker://registry.hra42.com/or-observer-frontend:latest docker://cloud-registry.hra42.com/or-observer/or-observer-frontend:latest --dest-creds "$CLOUD_REGISTRY_CREDS"
    environment:
      CLOUD_REGISTRY_CREDS:
        from_secret: cloud_registry_creds
    when:
      branch: main
      event: push
    depends_on:
      - manifest

  webhook-notification:
    image: plugins/webhook
    settings:
      urls:
        from_secret: webhook_url
      content_type: application/json
      template: |
        {
          "repo": "{{ repo.full_name }}",
          "commit": "{{ build.commit }}",
          "branch": "{{ build.branch }}",
          "status": "{{ build.status }}",
          "event": "{{ build.event }}",
          "author": "{{ build.author }}",
          "link": "{{ build.link }}",
          "started": "{{ build.started }}",
          "finished": "{{ build.finished }}",
          "tag": "{{ build.tag }}"
        }
    when:
      branch: main
      event: push
    depends_on:
      - skopeo-copy
