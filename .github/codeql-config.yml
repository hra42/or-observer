name: "CodeQL custom configuration"

# Exclude generated code, built bundles, and database files from CodeQL analysis
paths-ignore:
  - "frontend/build"
  - "frontend/build/**"
  - "frontend/.svelte-kit"
  - "frontend/.svelte-kit/**"
  - "data"
  - "data/**"
  - "**/node_modules"
  - "**/node_modules/**"
